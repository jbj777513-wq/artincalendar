name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt5 pyrebase4 requests pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller artincalendar.spec

      - name: Write version.txt
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Set-Content -Path "dist\아트인캘린더\version.txt" -Value $version -Encoding utf8
        shell: pwsh

      - name: Zip release
        run: |
          Compress-Archive -Path "dist\아트인캘린더\*" -DestinationPath "artincalendar-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artincalendar-${{ github.ref_name }}.zip
          name: ${{ github.ref_name }}
          body: "버전 ${{ github.ref_name }} 업데이트"
